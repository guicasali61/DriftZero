<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">

  <title>Switch</title>

<style>
:root {
  --c-gold:       rgb(255, 212, 0);
  --c-gold-dim:   rgba(255, 195, 0, 1);
  --c-orange:     rgba(255, 140, 0, 1);
  --c-orange-hot: rgba(255, 95, 0, 1);
}

body{
  margin:0;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  text-align:center;
  text-shadow: 0 0 8px rgba(0, 255, 200, 0.15);
  color: rgb(255, 255, 255);
  overflow-x:hidden;
}

*{
  font-family: 'Rajdhani', sans-serif;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;

  background-image: url("images/background.jpg");
  background-size: cover;
  background-position: center;

  transform: scale(1.03);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;

  background: radial-gradient(
    circle at center,
    rgba(0,0,0,0) 40%,
    rgba(0,0,0,0.35) 70%,
    rgba(0,0,0,0.85) 100%
  );

  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}

/* HEADER */
.header{
  position:relative;
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.logo{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-text{
  text-decoration: none;
  cursor: default;
  pointer-events: none;
  white-space: nowrap;
  font-size:70px;
  background: linear-gradient(135deg,
    var(--c-gold)        0%,
    var(--c-gold-dim)   25%,
    var(--c-orange)     60%,
    var(--c-orange-hot) 100%
  );
  background-size: 200% 200%;
  animation: gradShift 3s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo img{ width:20px; }

.title{
  font-size:24px;
  font-weight:bold;
  color: var(--c-gold-dim);
  display:flex;
  gap:10px;
  align-items:center;
  position:absolute;
  left:50px;
  top:40px;
}

.home-link{
  color: var(--c-gold-dim);
  text-decoration: none;
}

.home-link:hover{
  opacity: 0.8;
}

.title img{ width:36px; }

/* carrello logo */
.cart-wrapper{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
  padding-bottom:25px;
}

.cart-icon{
  display:flex;
  align-items:center;
  gap:8px;
  background: rgba(20,20,20,0.75);
  padding:10px 14px;
  border-radius:12px;
  color:white;
  text-decoration:none;
  border:1px solid var(--c-orange-hot);
  cursor:pointer;
}
  /* HOME (simmetrica al cart) */
.home-wrapper{
  position:fixed;
  top:20px;
  left:20px;
  z-index:9999;
}

.home-icon{
  display:flex;
  align-items:center;
  gap:8px;
  background: rgba(20,20,20,0.75);
  padding:10px 14px;
  border-radius:12px;
  color:white;
  text-decoration:none;
  border:1px solid var(--c-orange-hot);
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}

.home-icon:hover{
  transform: scale(1.05);
  border-color: var(--c-gold);
}

.cart-badge{
  background: var(--c-orange);
  color:black;
  font-weight:bold;
  font-size:12px;
  padding:3px 7px;
  border-radius:50px;
}

/* carrello dentro */
.cart-dropdown{
  position:absolute;
  right:0;
  top:55px;
  width:240px;
  background: rgba(20,20,20,0.95);
  border:1px solid var(--c-gold-dim);
  border-radius:12px;
  padding:10px;

  opacity:0;
  visibility:hidden;
  transform: translateY(-8px);
  transition:0.2s ease;
  pointer-events:none;

  margin-top:8px;
}

.cart-wrapper:hover .cart-dropdown,
.cart-dropdown:hover{
  opacity:1;
  visibility:visible;
  transform: translateY(0);
  pointer-events:auto;
}

.cart-items{
  max-height:160px;
  overflow-y:auto;
  font-size:13px;
  text-align:left;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding-bottom:4px;
}

.empty{
  text-align:center;
  opacity:0.6;
}

.go-cart{
  display:block;
  margin-top:10px;
  text-align:center;
  padding:8px;
  background: linear-gradient(135deg,
    var(--c-gold)        0%,
    var(--c-gold-dim)   25%,
    var(--c-orange)     60%,
    var(--c-orange-hot) 100%
  );
  background-size: 200% 200%;
  animation: gradShift 3s ease infinite;
  color:black;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* SECTION */
.section{
  position:relative;
  height:85vh;
}

/* CARDS */
.card-top-right,
.card-bottom-left{
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.card-top-right{ top:20px; right:40px; }
.card-bottom-left{ bottom:40px; left:40px; }

.card-img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.img-wrap{
  width:280px;
  height:280px;
  background:#000;
  border-radius:10px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px solid var(--c-gold-dim);
}

/* BOX */
.box{
  width:260px;
  height:260px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  background: rgb(12, 12, 12);
  border-radius:14px;
  border:3px solid var(--c-orange);

  backdrop-filter: blur(6px);
}

.box-title{
  color: var(--c-gold);
  font-weight:bold;
  font-size:20px;
}

.price{
  margin-top:15px;
  color: var(--c-orange);
  font-weight:900;
}

/* SELECT */
.color-select{
  margin-top:12px;
  padding:8px 12px;
  border-radius:8px;
  border:none;
  background:rgba(0,0,0,0.6);
  color:white;
  cursor:pointer;
}

/* BUTTON */
.buy-btn{
  margin-top:12px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.disabled{
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.3);
  cursor:not-allowed;
}

.enabled{
  background: linear-gradient(135deg,
    var(--c-gold)        0%,
    var(--c-gold-dim)   25%,
    var(--c-orange)     60%,
    var(--c-orange-hot) 100%
  );
  background-size: 200% 200%;
  animation: gradShift 3s ease infinite;
  color:black;
  cursor:pointer;
}

@keyframes gradShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Card centrale */
.center-info{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:700px;
  height:420px;

  border-radius:18px;
  display:flex;
  overflow:hidden;
  border:3px solid transparent;
  background-image:
    linear-gradient(black, black),
    linear-gradient(135deg,
      var(--c-gold)        0%,
      var(--c-gold-dim)   25%,
      var(--c-orange)     60%,
      var(--c-orange-hot) 100%
    );
  background-origin: border-box;
  background-clip: padding-box, border-box;
  background-size: auto, 200% 200%;
  animation: gradShift 3s ease infinite;
}

.column{
  flex:1;
  padding:30px;
  z-index:2;
  text-align:left;
}

.divider{
  width:1px;
  background:rgba(0,255,200,0.12);
  z-index:2;
}

.tech-row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  padding:6px 10px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
}

.ok{ color: var(--c-gold); font-weight:bold; }
.no{ color: var(--c-orange); font-weight:bold; }
/* =========================
   FIX RESPONSIVE TELEFONO
   ========================= */
@media (max-width: 768px) {
  body {
    overflow-x: hidden;
    text-shadow: 0 0 4px rgba(0, 255, 200, 0.12);
  }

  .header {
    min-height: auto;
    padding: 14px 12px 6px;
  }

  .logo-text {
    font-size: clamp(34px, 10vw, 52px);
    text-align: center;
  }

  .title {
    position: static;
    justify-content: center;
    margin-top: 4px;
    font-size: clamp(14px, 4vw, 18px);
  }

  .cart-wrapper {
    top: 10px;
    right: 10px;
    padding-bottom: 10px;
  }

  .cart-icon {
    padding: 7px 10px;
    font-size: 13px;
    border-radius: 10px;
  }

  .cart-dropdown {
    top: 46px;
    width: 200px;
  }

  .section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    padding: 18px 12px 30px;
    min-height: auto;
  }

  .card-top-right,
  .card-bottom-left {
    position: static !important;
    width: 100%;
    max-width: 340px;
    gap: 10px;
  }

  .img-wrap {
    width: 100%;
    max-width: 340px;
    aspect-ratio: 1 / 1;
    height: auto;
  }

  .box {
    width: 100%;
    max-width: 340px;
    min-height: auto;
    padding: 16px 14px;
  }

  .box-title {
    font-size: 18px;
  }

  .price {
    font-size: 18px;
    margin-top: 10px;
  }

  .color-select {
    width: 100%;
    font-size: 14px;
    padding: 10px 12px;
  }

  .buy-btn {
    width: 100%;
    max-width: none;
    font-size: 14px;
    padding: 11px 14px;
  }

  .center-info {
    position: static !important;
    transform: none !important;
    width: 100%;
    max-width: 340px;
    min-height: auto;
    flex-direction: column;
    border-radius: 14px;
    order: -1;
  }

  .column {
    padding: 14px;
    text-align: left;
  }

  .column h2 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 8px;
  }

  .divider {
    width: 100%;
    height: 1px;
  }

  .tech-row {
    font-size: 14px;
    padding: 10px 12px;
    margin: 8px 0;
    gap: 12px;
  }
}

/* =========================
   FIX RESPONSIVE IPAD / TABLET
   ========================= */
@media (min-width: 769px) and (max-width: 1199px) {
  body {
    overflow-x: hidden;
  }

  .header {
    padding: 18px 20px;
    min-height: 80px;
  }

  .logo-text {
    font-size: clamp(42px, 6vw, 64px);
  }

  .title {
    left: 22px;
    top: 78px;
    font-size: clamp(16px, 2vw, 22px);
  }

  .cart-wrapper {
    top: 16px;
    right: 16px;
  }

  .cart-icon {
    font-size: 14px;
    padding: 8px 12px;
  }

  .cart-dropdown {
    top: 50px;
    width: 220px;
  }

  .section {
    min-height: 100vh;
    padding: 30px 20px 40px;
  }

  .card-top-right {
    top: 40px;
    right: 20px;
    gap: 12px;
  }

  .card-bottom-left {
    bottom: 40px;
    left: 20px;
    gap: 12px;
  }

  .img-wrap {
    width: clamp(180px, 24vw, 260px);
    height: clamp(180px, 24vw, 260px);
  }

  .box {
    width: clamp(180px, 24vw, 260px);
    min-height: 210px;
    padding: 16px;
  }

  .box-title {
    font-size: clamp(16px, 2vw, 20px);
  }

  .price {
    font-size: clamp(16px, 2vw, 20px);
  }

  .color-select {
    width: 100%;
    font-size: 14px;
    padding: 8px 10px;
  }

  .buy-btn {
    width: 100%;
    max-width: none;
    font-size: 14px;
    padding: 10px 14px;
  }

  .center-info {
    width: clamp(420px, 52vw, 760px);
    min-height: 340px;
    border-radius: 18px;
  }

  .column {
    padding: 20px 18px;
  }

  .column h2 {
    font-size: clamp(20px, 2.2vw, 28px);
    margin-bottom: 10px;
  }

  .tech-row {
    font-size: clamp(15px, 1.6vw, 20px);
    padding: 10px 14px;
    margin: 10px 0;
    gap: 16px;
  }
}

</style>
</head>

<body>

<!-- LOGO NON MODIFICARE-->
<div class="header">
  
  
  <span class="logo-text">Joy-Con</span>

</div>
  <div class="home-wrapper">
  <a href="../index.html">homepage </a>
 
</div>
</div>
  <!--Fine non modificare -->


<!-- 🛒 CART -->
<div class="cart-wrapper">
  <div class="cart-icon">
    🛒 <span>Cart</span>
    <span class="cart-badge" id="cartCount">0</span>
  </div>

  <div class="cart-dropdown">
    <div class="cart-items" id="cartItems"></div>
    <a href="cart.html" class="go-cart">Go to Cart</a>
  </div>
</div>

<div class="section">

  <!-- CARD 1 -->
 <div class="card-top-right">
  <div class="box">
    <div class="box-title"> ZeroJoy-Con With Box</div>

    <select class="color-select" onchange="changeColor(1,this)">
      <option value=""> Choose Color</option>
      <option value="red">Red</option>
      <option value="white">White</option>
      <option value="pink">Pink</option>
    </select>

    <button id="btn1" class="buy-btn disabled" disabled
      onclick="addToCart('Joy-Con With Box', 35.99, document.getElementById('img1').src, document.querySelectorAll('.color-select')[0].value, this)">
      Add to cart
    </button>

    <div class="price">€35.99</div>
  </div>

  <div class="img-wrap">
    <img id="img1" class="card-img" src="images/joycon1.jpg">
  </div>
</div>

  <!-- CARD 2 -->
  <div class="card-bottom-left">
   <div class="img-wrap">
  <img id="img2" class="card-img" src="images/joycon2.jpg">
</div>

    <div class="box">
      <div class="box-title">Zero Joy-Con Without Box</div>

      <select class="color-select" onchange="changeColor(2,this)">
        <option value=""> Choose Color</option>
        <option value="Blue&Red">Blue&Red</option>
        <option value="Red&Blue">Red&Blue</option>
        <option value="Purple&Orange">Purple&Orange</option>
        <option value="Double Yellow">Double Yellow</option>
        <option value="Blue&Yellow">Blue&Yellow</option>
        <option value="Double Grey">Double Grey</option>
        <option value="Double White">Double White</option>
        <option value="Double Red">Double Red</option>
        <option value="Purple&Green">Purple&Green</option>
        <option value="Pink&Green">Pink&Green</option>
        <option value="Pink&Yellow">Pink&Yellow</option>
        <option value="Animal Crossing">Animal Crossing</option>
        <option value="Tawny">Pokèmon Let's go</option>
        <option value="Pink">Double Pink</option>
        <option value="Splatoon">Splatoon2</option>
        <option value="Monster Hunter">Monster Hunter</option>
        <option value="Zelda TOTK Gold">Zelda: TOTK</option>
        <option value="Zelda SkywardSword">Zelda: SkywardSword</option>
        <option value="Pokèmon">Pokèmon S&V</option>
        <option value="Super Mario">Super Mario</option>
      </select>

      <button id="btn2" class="buy-btn disabled" disabled
        onclick="addToCart('Zero Joy-Con Without Box', 20.99, document.getElementById('img2').src, document.querySelectorAll('.color-select')[1].value, this)">
        Add to cart
      </button>

      <div class="price">€20.99</div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center-info">
    <div class="column">
      <h2>Without Box</h2>
      <div class="tech-row"><span>Original Box</span><span class="no">✖</span></div>
      <div class="tech-row"><span>HD Rumble</span><span class="no">✖</span></div>
      <div class="tech-row"><span>Wrist Straps</span><span class="no">✖</span></div>
      <div class="tech-row"><span>NFC Reader</span><span class="no">✖</span></div>
      <div class="tech-row"><span>6-axis Gyroscope</span><span class="ok">✔</span></div>
      <div class="tech-row"><span>Nintendo Logos</span><span class="no">✖</span></div>
    </div>

    <div class="divider"></div>

    <div class="column">
      <h2>With Box</h2>
      <div class="tech-row"><span>Original Box</span><span class="ok">✔</span></div>
      <div class="tech-row"><span>HD Rumble</span><span class="ok">✔</span></div>
      <div class="tech-row"><span>Wrist Straps</span><span class="ok">✔</span></div>
      <div class="tech-row"><span>NFC Reader</span><span class="ok">✔</span></div>
      <div class="tech-row"><span>6-axis Gyroscope</span><span class="ok">✔</span></div>
      <div class="tech-row"><span>Nintendo Logos</span><span class="ok">✔</span></div>
    </div>
  </div>

</div>

<script>

function updateCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  document.getElementById("cartCount").innerText = cart.length;

  const list = document.getElementById("cartItems");
  list.innerHTML = "";

  if(cart.length === 0){
    list.innerHTML = "<div class='empty'>Cart is empty</div>";
    return;
  }

  cart.forEach(item=>{
    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `<span>${item.name}</span><span>€${item.price}</span>`;
    list.appendChild(div);
  });
}

function changeColor(card, select){
  const value = select.value;
  const img = document.getElementById("img" + card);
  const btn = document.getElementById("btn" + card);

  if(!value) return;

  img.src = `images/joycon${card}_${value}.jpg`;

  btn.disabled = false;
  btn.classList.remove("disabled");
  btn.classList.add("enabled");
}

function addToCart(name, price, image, color, btn){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: name + " - " + color,
    price,
    image,
    color
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  btn.innerText = "Added ✔";

  setTimeout(()=>{
    btn.innerText = "Add to cart";
  }, 900);

  updateCart();
}

updateCart();


</script>
