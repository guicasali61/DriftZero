<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Switch 2</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  color: rgba(202, 240, 248, 1);
  position:relative;
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background-image: url("../images/background.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* animazione animata gradient */
@keyframes gradientMove{
  0%{ background-position: 0% 50%; }
  50%{ background-position: 100% 50%; }
  100%{ background-position: 0% 50%; }
}

/* HEADER */
.header{
  position:relative;
  padding:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
}

.logo img{ width:70px; }

.title{
  font-size:32px;
  font-weight:bold;
  background: linear-gradient(90deg,
    rgba(3, 4, 94, 1),
    rgba(0, 119, 182, 1),
    rgba(0, 180, 216, 1),
    rgba(144, 224, 239, 1)
  );
  background-size: 300% 300%;
  animation: gradientMove 6s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* HOME */
.home-wrapper{
  position:fixed;
  top:20px;
  left:20px;
  z-index:9999;
}

.home-icon{
  display:flex;
  align-items:center;
  gap:8px;
  background: rgba(0,0,0,0.9);
  padding:10px 14px;
  border-radius:12px;
  color: rgba(202, 240, 248, 1);
  text-decoration:none;
  border:1px solid rgba(0, 119, 182, 1);
  cursor:pointer;
  font-size:14px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
}

.home-icon:hover{
  transform: scale(1.05);
  border-color: rgba(144, 224, 239, 1);
  box-shadow: 0 4px 20px rgba(144, 224, 239, 0.12);
}

/* SECTION */
.section{
  position: relative;
  width: 100%;
  height: 85vh;
}

/* CENTER CARD */
.center-info{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:520px;
  height:300px;
  border-radius:18px;
  background: rgba(0,0,0,1);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border:3px solid rgba(0, 119, 182, 1);

  box-shadow:
    0 0 25px rgba(0, 119, 182, 0.25),
    0 0 60px rgba(0,0,0,0.8),
    0 0 80px rgba(0, 180, 216, 0.12);
}

/* LUCI */
.center-info::before{
  content:"";
  position:absolute;
  inset:-60px;
  background:
    radial-gradient(circle at 30% 30%,
      rgba(0, 119, 182, 0.28),
      transparent 40%),
    radial-gradient(circle at 70% 70%,
      rgba(0, 180, 216, 0.20),
      transparent 45%);
  animation: glowMove 7s ease-in-out infinite;
  filter: blur(22px);
}

@keyframes glowMove{
  0%{ transform: translate(-6px, 4px); }
  50%{ transform: translate(10px, 6px); }
  100%{ transform: translate(-6px, 4px); }
}

/* CONTENT CENTER */
.disclaimer-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
  color: rgba(202, 240, 248, 1);
}

.disclaimer-text{
  font-size:14px;
  opacity:0.9;
  color: rgba(144, 224, 239, 1);
}

/* BUY BOX */
.buy-box{
  position:absolute;
  width:260px;
  height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  border-radius:14px;
  background: black;
  border: 3px solid rgba(0, 119, 182, 1);
  color: rgba(202, 240, 248, 1);
  padding:18px;
  z-index:3;
  box-shadow: 0 0 25px rgba(3, 4, 94, 0.35);
}

.buy-box.joycon2-rb{ bottom:20px; left:40px; }
.buy-box.joycon2-pg{ top:10px; right:40px; }

.card-img{
  position:absolute;
  width:260px;
  height:260px;
  object-fit:cover;
  left:0;
  border-radius:14px;
  z-index:5;
  transform: translateX(15px);
  border:4px solid rgba(144, 224, 239, 1);
}

.joycon2-rb-img{ top:-275px; }
.joycon2-pg-img{ bottom:-275px; }

.buy-title{
  font-weight:bold;
  font-size:20px;
  color: rgba(144, 224, 239, 1);
}

.buy-desc{
  margin-top:8px;
  font-size:14px;
  opacity:0.85;
  color: rgba(202, 240, 248, 1);
}

.price{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
  color: rgba(0, 180, 216, 1);
}

.buy-btn{
  margin-top:18px;
  padding:12px 22px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background: linear-gradient(90deg,
    rgba(3, 4, 94, 1),
    rgba(0, 119, 182, 1),
    rgba(0, 180, 216, 1),
    rgba(144, 224, 239, 1)
  );
  background-size: 300% 300%;
  animation: gradientMove 6s ease infinite;
  color: rgba(202, 240, 248, 1);
  font-weight:bold;
  font-size:15px;
}

/* CART */
.cart-wrapper{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
  padding-bottom:25px;
}

.cart-icon{
  display:flex;
  align-items:center;
  gap:8px;
  background: rgba(0,0,0,0.9);
  padding:10px 14px;
  border-radius:12px;
  color: rgba(202, 240, 248, 1);
  border:1px solid rgba(0, 119, 182, 1);
  cursor:pointer;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.cart-badge{
  background: rgba(144, 224, 239, 1);
  color: rgba(3, 4, 94, 1);
  font-weight:bold;
  font-size:12px;
  padding:3px 7px;
  border-radius:50px;
}

.cart-dropdown{
  position:absolute;
  right:0;
  top:55px;
  width:240px;
  background:black;
  border:1px solid rgba(0, 119, 182, 1);
  border-radius:12px;
  padding:10px;
  opacity:0;
  visibility:hidden;
  transform: translateY(-8px);
  transition:0.2s ease;
  pointer-events:none;
  margin-top:8px;
}

.cart-wrapper:hover .cart-dropdown,
.cart-dropdown:hover{
  opacity:1;
  visibility:visible;
  transform: translateY(0);
  pointer-events:auto;
}

.cart-items{
  max-height:160px;
  overflow-y:auto;
  font-size:13px;
  text-align:left;
  color: rgba(202, 240, 248, 1);
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  border-bottom:1px solid rgba(144, 224, 239, 0.18);
  padding-bottom:4px;
}

.empty{
  text-align:center;
  opacity:0.75;
  color: rgba(144, 224, 239, 1);
}

.go-cart{
  display:block;
  margin-top:10px;
  text-align:center;
  padding:8px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  background: linear-gradient(90deg,
    rgba(3, 4, 94, 1),
    rgba(0, 119, 182, 1),
    rgba(0, 180, 216, 1),
    rgba(144, 224, 239, 1)
  );
  background-size: 300% 300%;
  animation: gradientMove 6s ease infinite;
  color: rgba(202, 240, 248, 1);
}

/* =========================
   FIX IPAD / TABLET
   ========================= */
@media (min-width: 769px) and (max-width: 1180px) {
  .home-wrapper{
    top:16px;
    left:16px;
  }

  .home-icon{
    padding:9px 12px;
    font-size:14px;
  }

  .header{
    padding:18px 20px;
  }

  .logo img{
    width:56px;
  }

  .title{
    font-size:28px;
  }

  .cart-wrapper{
    top:16px;
    right:16px;
  }

  .cart-icon{
    padding:9px 12px;
    font-size:14px;
  }

  .cart-dropdown{
    width:220px;
    top:52px;
  }

  .section{
    height:100vh;
    min-height:900px;
  }

  .center-info{
    width:420px;
    height:250px;
    padding:20px;
    box-sizing:border-box;
  }

  .disclaimer-title{
    font-size:17px;
  }

  .disclaimer-text{
    font-size:13px;
    line-height:1.4;
    padding:0 8px;
  }

  .buy-box{
    width:210px;
    height:210px;
    padding:16px;
  }

  .bottom-left{
    left:24px;
    bottom:36px;
  }

  .top-right{
    right:24px;
    top:36px;
  }

  .card-img{
    width:210px;
    height:210px;
    transform:translateX(10px);
  }

  .bottom-left .card-img{
    top:-225px;
  }

  .top-right .card-img{
    bottom:-225px;
  }

  .buy-title{
    font-size:17px;
  }

  .buy-desc{
    font-size:13px;
  }

  .price{
    font-size:17px;
  }

  .buy-btn{
    margin-top:14px;
    padding:10px 16px;
    font-size:14px;
  }
}

/* =========================
   FIX TELEFONO
   ========================= */
@media (max-width: 768px) {
  body{
    overflow-x:hidden;
  }

  .home-wrapper{
    top:10px;
    left:10px;
  }

  .home-icon{
    padding:8px 10px;
    font-size:13px;
    gap:6px;
  }

  .header{
    padding:16px 12px 10px;
    flex-direction:column;
    gap:8px;
  }

  .logo{
    position:static;
    transform:none;
    margin-bottom:2px;
  }

  .logo img{
    width:52px;
  }

  .title{
    font-size:28px;
    line-height:1.1;
  }

  .cart-wrapper{
    top:10px;
    right:10px;
    padding-bottom:12px;
  }

  .cart-icon{
    padding:8px 10px;
    font-size:13px;
    gap:6px;
  }

  .cart-dropdown{
    width:190px;
    top:46px;
  }

  .section{
    position:relative;
    height:auto;
    min-height:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:24px;
    padding:20px 14px 40px;
  }

  .center-info,
  .buy-box,
  .bottom-left,
  .top-right{
    position:static;
    top:auto;
    right:auto;
    bottom:auto;
    left:auto;
    transform:none;
  }

  .center-info{
    order:1;
    width:100%;
    max-width:340px;
    height:auto;
    min-height:180px;
    padding:22px 16px;
    box-sizing:border-box;
  }

  .center-info::before{
    inset:-30px;
    filter:blur(18px);
  }

  .disclaimer-title{
    font-size:16px;
    line-height:1.3;
  }

  .disclaimer-text{
    font-size:13px;
    line-height:1.5;
  }

  .buy-box{
    order:2;
    width:100%;
    max-width:340px;
    height:auto;
    padding:14px 14px 18px;
    box-sizing:border-box;
  }

  .card-img{
    position:static;
    width:100%;
    max-width:100%;
    height:auto;
    aspect-ratio:1 / 1;
    transform:none;
    margin-bottom:14px;
    border-width:3px;
  }

  .bottom-left .card-img,
  .top-right .card-img{
    top:auto;
    bottom:auto;
  }

  .buy-title{
    font-size:18px;
    line-height:1.2;
  }

  .buy-desc{
    font-size:13px;
    margin-top:6px;
  }

  .price{
    font-size:17px;
    margin-top:10px;
  }

  .buy-btn{
    width:100%;
    max-width:220px;
    margin-top:14px;
    padding:11px 16px;
    font-size:14px;
  }
}

/* =========================
   FIX TELEFONI PICCOLI
   ========================= */
@media (max-width: 400px) {
  .title{
    font-size:24px;
  }

  .center-info,
  .buy-box{
    max-width:300px;
  }

  .buy-title{
    font-size:16px;
  }

  .disclaimer-title{
    font-size:15px;
  }

  .disclaimer-text,
  .buy-desc{
    font-size:12px;
  }

  .cart-dropdown{
    width:170px;
  }
}
</style>
</head>

<body>
<!--link redirect+titolo-->
   <header class="header">
  <a href="../index.html" class="logo">
    <img src="images/logo.png">
  </a>
  <div class="title">Zero Joy-Con 2</div>
  <nav>
   <a href="cart.html">Carrello</a>
    <a href="../index.html">Homepage</a>
   
  

  </nav>
  
</header>



<!-- CART -->
 <section>
<div class="cart-wrapper">
  <div class="cart-icon">
    🛒 Cart <span class="cart-badge" id="cartCount">0</span>
  </div>
  
  <div class="cart-dropdown">
    <div class="cart-items" id="cartItems"></div>
    <a href="cart.html" class="go-cart">Go to Cart</a>
  </div>
</div>
</section>




<!--prodotti -->
<section>

<div class="section">
  
  
  <div class="buy-box joycon2-rb">
      <img class="joycon2-rb-img" src="../images/joycon2rb.jpg">
    <div class="buy-title">Zero Joy-Con 2 Red&Blue</div>
    <div class="buy-desc">The boring classic ones</div>
    <div class="price">€55.99</div>
     <button class="buy-btn" onclick="addToCart(event,'Zero Joy-Con 2 Red&Blue',55.99,'images/joycon2rb.jpg')">
      Add to cart
    </button>
  </div>
 





  <div class="buy-box joycon2-pg">
    <img class="joycon2-pg-img" src="../images/joycon2pg.jpg">

    <div class="buy-title">Zero Joy-Con 2 Purple&Green</div>
    <div class="buy-desc">The cool new ones</div>
    <div class="price">€65.99</div>

    <button class="buy-btn" onclick="addToCart(event,'Zero Joy-Con 2 Purple&Green',65.99,'images/joycon2pg.jpg')">
      Add to cart
    </button>
  </div>
  </div>
 </section>

  
 
 
  
  
 
  <!--card centrale-->
<section>
  <div class= "center-info">
    <div class="disclaimer-title">DISCLAIMER: No mouse function</div>
    <div class="disclaimer-text">
      All products sold on this page DO NOT include mouse functionality.
    </div>
    </div>

    
    </section>
  
<script>
function updateCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  document.getElementById("cartCount").innerText = cart.length;

  const list = document.getElementById("cartItems");
  list.innerHTML = "";

  if(cart.length === 0){
    list.innerHTML = "<div class='empty'>Cart is empty</div>";
    return;
  }

  cart.forEach(item=>{
    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `<span>${item.name}</span><span>€${item.price}</span>`;
    list.appendChild(div);
  });
}

function addToCart(e, name, price, image){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({name, price, image});
  localStorage.setItem("cart", JSON.stringify(cart));

  const btn = e.target;
  btn.innerText = "Added ✔";

  setTimeout(()=>{
    btn.innerText = "Add to cart";
  },900);

  updateCart();
}

updateCart();
</script>

</body>
</html>
