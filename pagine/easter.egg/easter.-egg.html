<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baroque Works</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
   
  /* BASE */
  --base: rgba(244, 140, 6, 1);

  /* LIGHT */
  --light: rgba(255, 180, 80, 1);

  /* SOFT */
  --soft: rgba(244, 140, 6, 0.15);

  /* DARK */
  --dark: rgba(160, 80, 0, 1);

  /* BACKGROUND */
  --bg: rgba(244, 140, 6, 0.95);

  /* TEXT */
  --text: #000;
}
    
    

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Bebas Neue", sans-serif;
      color: black;
       color: var(--text);
    }

    .container {
      width: min(100% - 40px, var(--max-width));
      margin: 0 auto;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 80px 0;
      clip-path: fill-box;
      background-color:rgba(235, 90, 0, 1);
      color: var(--text);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      align-items: center;
      gap: 34px;
      width: 100%;
    }

    .hero-left h1 {
      margin-bottom: 22px;
     font-family: "Bebas Neue", sans-serif;
      font-size: clamp(3rem, 7vw, 6.2rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero-left p {
      max-width: 640px;
      font-size: 1.9rem;
      line-height: 1.1;
      font-weight: 900;
      font-style: uppercase;
      color:black;
    }

    .hero-right {
      position: relative;
      min-height: 520px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 36px;
    }

  
    .studio-mark {
      position: relative;
      z-index: 1;
      width: min(78%, 380px);
      aspect-ratio: 4 / 5;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
     background-color: black;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
    }

    .studio-mark span {
      font-family: "Cinzel", serif;
      font-size: clamp(3rem, 7vw, 5rem);
      color: var(--light);
      text-shadow: 0 0 30px rgba(214, 179, 111, 0.18);
    }

    @media (max-width: 980px) {
      .hero {
        min-height: auto;
        padding: 60px 0;
      }

      .hero-grid {
        grid-template-columns: 1fr;
      }

      .hero-art {
        min-height: 420px;
      }
    }

    @media (max-width: 640px) {
      .container {
        width: min(100% - 24px, var(--max-width));
      }

      .hero-copy p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-grid">
          <div class="hero-left">
            <h1>Baroque Works</h1>
            <p>
              We build atmospheric game worlds shaped by tension, elegance,
              and strong visual identity. Every project begins with mood,
              meaning, and memorable presence.
            </p>
          </div>

          <img class="hero-right" src="immagini/hero.png" alt="Baroque Works hero img" />

         
              <span>B</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
