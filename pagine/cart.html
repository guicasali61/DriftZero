<!DOCTYPE html>
<html lang="eng">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial;
    background: #000;
    color: white;
    text-align: center;
    min-height: 100vh;
}

canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
}

.content {
    position: relative;
    z-index: 1;
    padding: 40px 20px;
}

h1 { font-size: 2rem; margin-bottom: 20px; }

a { color: white; text-decoration: none; }
a:hover { text-decoration: underline; }

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin: 30px auto;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 10px;
    width: 180px;
}

.card img { width: 150px; border-radius: 10px; }

.card button {
    background: transparent;
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
}

.card button:hover { background: rgba(255,255,255,0.08); }

#checkoutBtn {
    background: transparent;
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 14px 40px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
    display: none;
}

#checkoutBtn:hover { background: rgba(255,255,255,0.08); }
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="content">
    <h1>🛒 Carrello</h1>
    <a href="index.html">⬅ Torna allo Shop</a>
    <div class="container" id="cartContainer"></div>
    <h2 id="total">Totale: 0€</h2>
    <button id="checkoutBtn" onclick="window.location.href='checkout.html'">
        Procedi al Checkout →
    </button>
</div>

<script>
// ── Sfondo animato ──────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#c850c0','#ff6eb4','#00ffff','#b57bee','#ff9de2','#7df9ff'];
const N = 80;
const MAX_DIST = 130;

let particles = [];
function rand(a, b) { return a + Math.random() * (b - a); }

for (let i = 0; i < N; i++) {
    particles.push({
        x: rand(0, canvas.width),
        y: rand(0, canvas.height),
        vx: rand(-0.1, 0.1),
        vy: rand(-0.1, 0.1),
        r: rand(1.5, 3),
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
    });
}

function hexToRgb(hex) {
    let r = parseInt(hex.slice(1,3), 16);
    let g = parseInt(hex.slice(3,5), 16);
    let b = parseInt(hex.slice(5,7), 16);
    return `${r},${g},${b}`;
}

function drawBg() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < N; i++) {
        let a = particles[i];
        for (let j = i + 1; j < N; j++) {
            let b = particles[j];
            let dx = a.x - b.x, dy = a.y - b.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < MAX_DIST) {
                let alpha = (1 - dist / MAX_DIST) * 0.1;
                let grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
                grad.addColorStop(0, `rgba(${hexToRgb(a.color)},${alpha})`);
                grad.addColorStop(1, `rgba(${hexToRgb(b.color)},${alpha})`);
                ctx.beginPath();
                ctx.strokeStyle = grad;
                ctx.lineWidth = 0.6;
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
            }
        }
    }

    for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${hexToRgb(p.color)}, 0.15)`;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 2;
        ctx.fill();
        ctx.shadowBlur = 0;

        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width)  p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    }

    requestAnimationFrame(drawBg);
}

drawBg();

// ── Carrello ────────────────────────────────────────────────
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let container = document.getElementById("cartContainer");
    container.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <img src="${item.img}">
            <h3>${item.name}</h3>
            <p>${item.price}€</p>
            <button onclick="removeItem(${index})">Rimuovi</button>
        `;
        container.appendChild(div);
    });

    document.getElementById("total").textContent = "Totale: " + total.toFixed(2) + "€";

    let checkoutBtn = document.getElementById("checkoutBtn");
    checkoutBtn.style.display = cart.length > 0 ? "inline-block" : "none";
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

loadCart();
</script>

</body>
</html>
