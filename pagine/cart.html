<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
}

body {
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  text-align: center;
  min-height: 100vh;
}

.carrello {
  position: relative;
  z-index: 1;
  padding: 40px 20px;
}

h1 {
  font-size: 2rem;
  margin-bottom: 20px;
}

a {
  color: white;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

#cartItems {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin: 30px auto;
}

.cart-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 10px;
  width: 200px;
}

.cart-item-image img {
  width: 150px;
  height: 150px;
  object-fit: contain;
  margin: 0 auto 10px;
}

.cart-item-name {
  font-weight: bold;
  margin-bottom: 6px;
}

.cart-item-meta {
  color: rgba(255,255,255,0.65);
  margin-bottom: 6px;
}

.cart-item-price {
  font-weight: bold;
  margin-bottom: 10px;
}

.cart-item-remove {
  background: transparent;
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
}

.cart-item-remove:hover {
  background: rgba(255,255,255,0.08);
}

.cart-empty {
  width: 100%;
  padding: 30px;
  color: rgba(255,255,255,0.65);
}

#cartSubtotal {
  display: inline-block;
  margin: 20px 0;
  font-size: 1.4rem;
  font-weight: bold;
}

.cart-clear-btn,
.checkout-btn {
  background: transparent;
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 14px 30px;
  font-size: 17px;
  border-radius: 10px;
  cursor: pointer;
  margin: 10px;
}

.cart-clear-btn:hover,
.checkout-btn:hover {
  background: rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="carrello">
  <h1>🛒 Cart</h1>

  <p>Here you can see the products added to your cart:</p>

  <div id="cartItems"></div>

  <h2>
    Total: <span id="cartSubtotal">€0.00</span>
  </h2>

  <button class="cart-clear-btn" id="clearCartBtn" type="button">
    Clear Cart
  </button>

  <button class="checkout-btn" type="button" onclick="window.location.href='checkout.html'">
    Proceed to Checkout →
  </button>

  <br><br>

  <a href="../index.html">⬅ Back to Shop</a>
</div>

<script src="../codici-js/cart.js"></script>

</body>
</html>
