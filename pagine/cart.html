<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | DriftZero</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070709;
  --panel:#101016;
  --text:rgba(255,255,255,0.94);
  --muted:rgba(255,255,255,0.58);
  --stroke:rgba(255,255,255,0.12);

  --accent1:#00e5ff;
  --accent2:#6a5cff;
  --accent-soft:rgba(0,229,255,0.14);
  --danger:#ff4d6d;
}

*{ 
  margin:0; 
  padding:0; 
  box-sizing:border-box; 
  font-family:"Rajdhani", sans-serif;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(0,229,255,0.16), transparent 34%),
    radial-gradient(circle at bottom right, rgba(106,92,255,0.18), transparent 38%),
    var(--bg);
  color:var(--text);
}

a{
  color:var(--text);
  text-decoration:none;
}

.carrello{
  position:relative;
  z-index:1;
  width:min(1180px, 92%);
  margin:0 auto;
  padding:56px 0;
}

.cart-header{
  text-align:center;
  margin-bottom:42px;
}

.cart-kicker{
  display:inline-block;
  margin-bottom:12px;
  color:var(--accent1);
  font-size:0.85rem;
  font-weight:700;
  letter-spacing:0.22em;
  text-transform:uppercase;
}

h1{
  font-size:clamp(2.7rem, 7vw, 5.2rem);
  line-height:0.9;
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:18px;
}

.cart-header p{
  color:var(--muted);
  font-size:1.1rem;
  font-weight:500;
}

#cartItems{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:18px;
  margin:36px auto;
}

.cart-item{
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg, rgba(255,255,255,0.075), rgba(255,255,255,0.025));
  border:1px solid var(--stroke);
  border-radius:22px;
  padding:18px;
  min-height:310px;
  box-shadow:0 24px 70px rgba(0,0,0,0.35);
}

.cart-item::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, var(--accent-soft), transparent 42%);
  opacity:0;
  transition:0.25s ease;
  pointer-events:none;
}

.cart-item:hover::before{
  opacity:1;
}

.cart-item-image{
  position:relative;
  z-index:1;
  height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:14px;
}

.cart-item-image img{
  width:155px;
  height:155px;
  object-fit:contain;
  filter:drop-shadow(0 18px 26px rgba(0,0,0,0.55));
}

.cart-item-name,
.cart-item-meta,
.cart-item-price,
.cart-item-remove{
  position:relative;
  z-index:1;
}

.cart-item-name{
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:0.04em;
  text-transform:uppercase;
  margin-bottom:7px;
}

.cart-item-meta{
  color:var(--muted);
  font-size:0.95rem;
  font-weight:500;
  margin-bottom:8px;
}

.cart-item-price{
  color:white;
  font-size:1.25rem;
  font-weight:700;
  margin-bottom:16px;
}

.cart-item-remove{
  width:100%;
  background:rgba(255,255,255,0.03);
  color:var(--text);
  border:1px solid rgba(255,255,255,0.16);
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  transition:0.2s ease;
}

.cart-item-remove:hover{
  border-color:rgba(255,77,109,0.65);
  color:var(--danger);
  background:rgba(255,77,109,0.08);
}

.cart-empty{
  grid-column:1 / -1;
  padding:46px 20px;
  border:1px dashed rgba(255,255,255,0.18);
  border-radius:22px;
  color:var(--muted);
  text-align:center;
  font-size:1.15rem;
}

.cart-summary{
  margin:34px auto 0;
  max-width:540px;
  padding:26px;
  border:1px solid var(--stroke);
  border-radius:24px;
  background:rgba(255,255,255,0.045);
  box-shadow:0 24px 70px rgba(0,0,0,0.35);
  text-align:center;
}

.cart-summary h2{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  font-size:1.35rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:22px;
}

#cartSubtotal{
  color:var(--accent1);
  font-size:1.8rem;
  font-weight:700;
}

.cart-actions{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.cart-clear-btn,
.checkout-btn{
  border:none;
  padding:14px 26px;
  font-size:1rem;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  transition:0.22s ease;
}

.cart-clear-btn{
  background:transparent;
  color:var(--text);
  border:1px solid rgba(255,255,255,0.18);
}

.cart-clear-btn:hover{
  background:rgba(255,255,255,0.08);
}

.checkout-btn{
  color:#020205;
  background:linear-gradient(135deg, var(--accent1), var(--accent2));
  box-shadow:0 0 30px rgba(0,229,255,0.24);
}

.checkout-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 42px rgba(0,229,255,0.34);
}

.back-link{
  display:block;
  width:max-content;
  margin:28px auto 0;
  color:var(--muted);
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  transition:0.2s ease;
}

.back-link:hover{
  color:var(--accent1);
}

@media(max-width:600px){
  .carrello{
    padding:38px 0;
  }

  .cart-summary h2{
    flex-direction:column;
    gap:6px;
  }

  .cart-clear-btn,
  .checkout-btn{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="carrello">

  <header class="cart-header">
    <span class="cart-kicker">DriftZero checkout</span>
    <h1>Cart</h1>
    <p>Review your selected controllers before moving to checkout.</p>
  </header>

  <div id="cartItems"></div>

  <section class="cart-summary">
    <h2>
      Total
      <span id="cartSubtotal">€0.00</span>
    </h2>

    <div class="cart-actions">
      <button class="cart-clear-btn" id="clearCartBtn" type="button">
        Clear Cart
      </button>

      <button class="checkout-btn" id="checkoutBtn" type="button">
        Proceed to Checkout →
      </button>
    </div>
  </section>

  <a class="back-link" href="../index.html">← Back to Shop</a>

</div>

<script src="../codici-js/cart.js"></script>

</body>
</html>
