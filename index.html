<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriftZero</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg: #0a0a0a;
  --card: #111;
  --accent1: #00ffff;
  --accent2: #703fff;
  --text: rgba(255,255,255,0.9);
}

*{
  box-sizing: border-box;
  font-family: 'Rajdhani', sans-serif;
}

body{
  margin:0;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
  font-size:24px;
  font-weight:700;
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-left:-20px;
}

.cart{
  cursor:pointer;
}

/* =========================
   HERO SECTION
========================= */


.hero{
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 35px 20px 80px 20px;
  
}

.hero-color-btn{
  padding: 14px 24px;
  color: black;
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  border-radius: 10px;
  border: 3px solid black;
  font-size: 20px;
  cursor: pointer;
  font-weight:700;
  
}

.hero-text{
  max-width: 500px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  margin-left: 20px;
  margin-top:-20px;
}

.hero-img img{
  max-width: 100%;
  width: 460px;
  height: auto;
  display: block;
  margin-right: 20px;
  border: 3px solid var(--accent1);
  border-radius: 24px;
  
}

.hero-colors{
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.hero-colors{
  display: flex;
  gap: 20px;
  margin-top: 16px;
}

.hero-dot{
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.35);
  cursor: pointer;
  padding: 0;
  appearance: none;
  -webkit-appearance: none;
}

.hero-dot.standard{
  background: gray;
}

.hero-dot.red{
  background: red;
}

.hero-dot.blue{
  background: blue;
}

.hero-dot.purple{
  background: purple;
}

.hero h2{
  font-size: 24px;
  opacity: 0.8;
  margin:0 0 18px 0;

}

/* PRODUCTS */
.products{
  display:flex;
  gap:30px;
  justify-content:center;
  padding:40px;
  flex-wrap:wrap;
}

.card{
  background: var(--card);
  padding:20px;
  width:280px;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform: translateY(-5px);
  border-color: var(--accent1);
}

.card img{
  width:100%;
}

.card h3{
  margin:15px 0;
}

.price{
  margin-bottom:10px;
  opacity:0.7;
}

/* BUTTON */
.btn{
  padding:10px;
  border:none;
  cursor:pointer;
  width:100%;
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  color:black;
  font-weight:600;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DriftZero</div>
  <div class="cart">🛒</div>
</div>
<!--hero-->

<section class="hero">
  
<div class="hero-text">
<h1>Zero Drift. Zero Problem.</h1>
<h2> 20+ Colors, 3 Model , Choose yours</h2>
<button class="hero-color-btn">Explore Colors</button>
</div>

<div class="hero-img">
<img src ="../images/hero-joycon.jpg" alt="Zero Joy-Con">


<div class="hero-colors">
  <button class="hero-dot standard"></button>
  <button class="hero-dot red"></button>
  <button class="hero-dot blue"></button>
  <button class="hero-dot purple"></button>
</div>
</div>

</section>

<div class="products">

  <div class="card">
    <img src="images/lite.jpg">
    <h3>Zero Joy-Con Lite</h3>
    <div class="price">€39.99</div>
    <button class="btn">Add to Cart</button>
  </div>

  <div class="card">
    <img src="images/plus.jpg">
    <h3>Zero Joy-Con Plus</h3>
    <div class="price">€59.99</div>
    <button class="btn">Add to Cart</button>
  </div>

  <div class="card">
    <img src="images/pro.jpg">
    <h3>Zero Controller Pro</h3>
    <div class="price">€79.99</div>
    <button class="btn">Add to Cart</button>
  </div>

</div>

<script>
console.log("Homepage loaded");
</script>

</body>
</html>
